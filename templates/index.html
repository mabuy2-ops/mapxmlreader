<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地籍図XML → DXF 変換</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #63b3ed;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 32px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #2d3748;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #63b3ed;
      background: rgba(99, 179, 237, 0.06);
    }
    .drop-zone .icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
      display: block;
    }
    .drop-zone .main-text {
      font-size: 0.95rem;
      color: #a0aec0;
    }
    .drop-zone .sub-text {
      font-size: 0.8rem;
      color: #4a5568;
      margin-top: 6px;
    }
    input[type="file"] { display: none; }

    /* Selected file badge */
    .file-badge {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(99, 179, 237, 0.1);
      border: 1px solid rgba(99, 179, 237, 0.3);
      border-radius: 8px;
    }
    .file-badge .file-icon { font-size: 1.3rem; }
    .file-badge .file-info { flex: 1; min-width: 0; }
    .file-badge .file-name {
      font-size: 0.9rem;
      color: #63b3ed;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-badge .file-size { font-size: 0.78rem; color: #718096; }
    .file-badge .remove-btn {
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .file-badge .remove-btn:hover { color: #fc8181; }

    /* Convert button */
    .btn-convert {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-convert:hover:not(:disabled) { background: #2b6cb0; }
    .btn-convert:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Progress */
    .progress-section {
      display: none;
      margin-top: 20px;
    }
    .progress-track {
      background: #2d3748;
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3182ce, #63b3ed);
      width: 0%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .progress-label {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #718096;
      text-align: center;
    }

    /* Error */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(245, 101, 101, 0.1);
      border: 1px solid rgba(245, 101, 101, 0.4);
      border-radius: 8px;
      color: #fc8181;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    /* Success */
    .success-box {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(72, 187, 120, 0.1);
      border: 1px solid rgba(72, 187, 120, 0.35);
      border-radius: 8px;
      color: #68d391;
      font-size: 0.88rem;
    }

    /* Layer info */
    .layer-info {
      margin-top: 28px;
      padding: 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid #2d3748;
      border-radius: 10px;
    }
    .layer-info h3 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a5568;
      margin-bottom: 12px;
    }
    .layer-list {
      list-style: none;
      display: grid;
      gap: 6px;
    }
    .layer-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #a0aec0;
    }
    .layer-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>地籍図XML → DXF 変換</h1>
      <p>法務省地籍図XMLをCAD用DXFファイルに変換します</p>
    </div>

    <div class="drop-zone" id="dropZone">
      <span class="icon">🗂️</span>
      <div class="main-text">ここにZIPまたはXMLをドロップ</div>
      <div class="sub-text">またはクリックしてファイルを選択</div>
    </div>
    <input type="file" id="fileInput" accept=".xml,.zip">

    <div class="file-badge" id="fileBadge">
      <span class="file-icon">📄</span>
      <div class="file-info">
        <div class="file-name" id="fileName">-</div>
        <div class="file-size" id="fileSize">-</div>
      </div>
      <button class="remove-btn" id="removeBtn" title="削除">✕</button>
    </div>

    <button class="btn-convert" id="convertBtn" disabled>
      変換してDXFをダウンロード
    </button>

    <div class="progress-section" id="progressSection">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">処理中...</div>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <div class="layer-info">
      <h3>出力レイヤー</h3>
      <ul class="layer-list">
        <li><span class="layer-dot" style="background:#e53e3e"></span>筆界線 — 筆界境界線</li>
        <li><span class="layer-dot" style="background:#38a169"></span>地番 — 地番テキスト</li>
        <li><span class="layer-dot" style="background:#3182ce"></span>筆界点 — 筆界点</li>
        <li><span class="layer-dot" style="background:#d69e2e"></span>基準点 — 基準点・多角点</li>
        <li><span class="layer-dot" style="background:#e2e8f0"></span>図郭 — 図郭枠・地図番号</li>
      </ul>
    </div>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const fileBadge  = document.getElementById('fileBadge');
    const fileName   = document.getElementById('fileName');
    const fileSize   = document.getElementById('fileSize');
    const removeBtn  = document.getElementById('removeBtn');
    const convertBtn = document.getElementById('convertBtn');
    const progressSection = document.getElementById('progressSection');
    const progressFill    = document.getElementById('progressFill');
    const progressLabel   = document.getElementById('progressLabel');
    const errorBox   = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      clearFile();
    });

    function setFile(f) {
      selectedFile = f;
      fileName.textContent = f.name;
      fileSize.textContent = formatSize(f.size);
      fileBadge.style.display = 'flex';
      convertBtn.disabled = false;
      hideMessages();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileBadge.style.display = 'none';
      convertBtn.disabled = true;
      hideMessages();
    }

    function hideMessages() {
      errorBox.style.display = 'none';
      successBox.style.display = 'none';
      progressSection.style.display = 'none';
    }

    function formatSize(bytes) {
      if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024).toFixed(0) + ' KB';
    }

    // Animated progress (fake — shows parsing/writing progress estimates)
    let progressTimer = null;
    function startProgress() {
      progressSection.style.display = 'block';
      progressFill.style.transition = 'none';
      progressFill.style.width = '0%';

      const steps = [
        { pct: 15, label: 'XMLを読み込み中...', delay: 200 },
        { pct: 45, label: '座標データを解析中...', delay: 1500 },
        { pct: 70, label: '筆・地番データを解析中...', delay: 4000 },
        { pct: 88, label: 'DXFを生成中...', delay: 7000 },
      ];

      steps.forEach(({ pct, label, delay }) => {
        setTimeout(() => {
          progressFill.style.transition = 'width 1.5s ease';
          progressFill.style.width = pct + '%';
          progressLabel.textContent = label;
        }, delay);
      });
    }

    function finishProgress(ok) {
      progressFill.style.transition = 'width 0.3s ease';
      progressFill.style.width = '100%';
      progressLabel.textContent = ok ? '完了！' : 'エラーが発生しました';
    }

    async function convert() {
      if (!selectedFile) return;

      convertBtn.disabled = true;
      hideMessages();
      startProgress();

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const resp = await fetch('/convert', { method: 'POST', body: formData });

        if (resp.ok) {
          finishProgress(true);

          const blob = await resp.blob();
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          const cd   = resp.headers.get('Content-Disposition') || '';
          const m    = cd.match(/filename[^;=\n]*=(?:(['"])([^'"]*)\1|([^;\n]*))/i);
          a.download = m ? (m[2] || m[3] || 'output.dxf').trim() : 'output.dxf';
          a.href = url;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          successBox.style.display = 'block';
          successBox.textContent = `DXFファイルをダウンロードしました: ${a.download}`;
        } else {
          const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
          throw new Error(err.error || '変換に失敗しました');
        }
      } catch (e) {
        finishProgress(false);
        errorBox.style.display = 'block';
        errorBox.textContent = `エラー: ${e.message}`;
      } finally {
        convertBtn.disabled = false;
      }
    }

    convertBtn.addEventListener('click', convert);
  </script>
</body>
</html>
